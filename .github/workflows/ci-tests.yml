name: Containerized CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    name: .NET Backend Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Restore .NET Dependencies
        run: dotnet restore AccessoriesApp.slnx

      - name: Run Backend Tests
        run: dotnet test AccessoriesApp.slnx --no-restore --verbosity normal

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests  # Wait for backend tests to pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start API Server
        run: |
          cd Accessories.Api
          dotnet build
          dotnet run &
          # Wait for API to be ready
          sleep 10
          for i in {1..60}; do
            if curl -f http://localhost:8080/api/products > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... (attempt $i)"
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Install Node Dependencies
        working-directory: ./accessories-web
        run: npm ci

      - name: Run E2E Tests
        working-directory: ./accessories-web
        run: npm test -- --watch=false --browsers=ChromeHeadless

  frontend-tests:
    name: Angular Frontend Tests
    runs-on: ubuntu-latest
    container:
      image: markhobson/node-chrome:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node Dependencies
        working-directory: ./accessories-web
        run: npm ci

      - name: Run Angular Tests
        working-directory: ./accessories-web
        run: npm test -- --watch=false --browsers=ChromeHeadless