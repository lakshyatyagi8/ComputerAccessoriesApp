name: Containerized CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend-tests:
    name: .NET Backend Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Restore .NET Dependencies
      run: dotnet restore AccessoriesApp.slnx

    # 1. Run Unit and Integration tests FIRST (Before starting the API)
    - name: Run Unit & Integration Tests
      run: dotnet test Accessories.Api.Tests/Accessories.Api.Tests.csproj --no-restore --verbosity normal

    # 2. Install Playwright for the E2E Project
    - name: Build E2E tests
      run: dotnet build Accessories.E2ETests/Accessories.E2ETests.csproj
    - name: Install Playwright Dependencies
      run: pwsh Accessories.E2ETests/bin/Debug/net8.0/playwright.ps1 install --with-deps

    # 3. Start the Backend API
    - name: Start the Backend API
    # Remove any existing SQLite database files to prevent locks/contamination
    # Start the API in the background
    # Wait for the server and database initialization to complete
      run: |        
        rm -f Accessories.Api/*.db 
        export ASPNETCORE_URLS="http://127.0.0.1:8080"
        export ASPNETCORE_ENVIRONMENT="Development"
        dotnet run --project Accessories.Api/Accessories.Api.csproj &
        sleep 10

    # 4. Run ONLY the E2E Tests against the running API
    - name: Run E2E Tests
      run: dotnet test Accessories.E2ETests/Accessories.E2ETests.csproj --no-build --verbosity normal

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: backend-tests  # Wait for backend tests to pass
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start API Server
        run: |
          cd Accessories.Api
          dotnet build
          dotnet run &
          # Wait for API to be ready
          sleep 10
          for i in {1..60}; do
            if curl -f http://localhost:8080/api/products > /dev/null 2>&1; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... (attempt $i)"
            sleep 2
          done
          echo "API failed to start"
          exit 1

      - name: Install Node Dependencies
        working-directory: ./accessories-web
        run: npm ci

      - name: Run E2E Tests
        working-directory: ./accessories-web
        run: npm test -- --watch=false --browsers=ChromeHeadless

  frontend-tests:
    name: Angular Frontend Tests
    runs-on: ubuntu-latest
    container:
      image: markhobson/node-chrome:24
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Node Dependencies
        working-directory: ./accessories-web
        run: npm ci

      - name: Run Angular Tests
        working-directory: ./accessories-web
        run: npm test -- --watch=false --browsers=ChromeHeadless